<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Panel de Hogar</title>
<style>
html, body {
margin: 0;
padding: 0;
width: 100%;
height: 100%;
background: #050505;
color: #ffb000;
font-family: "Courier New", monospace;
overflow: hidden;
}

.screen {
width: 100vw;
height: 100vh;
box-sizing: border-box;
padding: 18px 26px 18px 26px;
display: grid;
grid-template-rows: 78px 1fr 96px;
gap: 10px;
background-image:
linear-gradient(rgba(255,176,0,0.06) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,176,0,0.06) 1px, transparent 1px);
background-size: 28px 28px, 28px 28px;
background-position: center center;
}

.topbar {
display: grid;
grid-template-columns: 1fr auto;
align-items: start;
}

.clock {
font-size: 58px;
line-height: 1;
letter-spacing: 2px;
text-shadow: 0 0 8px rgba(255,176,0,0.35);
}

.threat {
display: flex;
align-items: center;
gap: 12px;
font-size: 22px;
line-height: 1;
padding-top: 6px;
text-shadow: 0 0 8px rgba(255,176,0,0.25);
}

.shield {
width: 24px;
height: 28px;
display: inline-block;
}

.content {
display: grid;
grid-template-columns: 1fr 720px 1fr;
align-items: start;
}

.plans {
grid-column: 2;
display: grid;
grid-template-rows: 1.45fr 1fr;
gap: 22px;
min-height: 0;
}

.panel {
position: relative;
border: 1px solid rgba(255,176,0,0.18);
box-shadow: inset 0 0 20px rgba(255,176,0,0.04);
padding: 16px 14px 12px 14px;
min-height: 0;
background: rgba(0,0,0,0.18);
}

.panel-title {
position: absolute;
top: -9px;
right: 16px;
background: #050505;
padding: 0 8px;
font-size: 12px;
letter-spacing: 1px;
color: rgba(255,176,0,0.9);
}

svg {
width: 100%;
height: 100%;
display: block;
}

.wall {
stroke: #ffb000;
stroke-width: 2.2;
fill: none;
stroke-linecap: square;
shape-rendering: crispEdges;
filter: drop-shadow(0 0 2px rgba(255,176,0,0.35));
}

.wall-soft {
stroke: rgba(255,176,0,0.55);
stroke-width: 1.4;
fill: none;
shape-rendering: crispEdges;
}

.dash {
stroke: rgba(255,176,0,0.42);
stroke-width: 1.4;
fill: none;
stroke-dasharray: 8 7;
shape-rendering: crispEdges;
}

.door {
stroke: #ffb000;
stroke-width: 4.5;
stroke-linecap: round;
filter: drop-shadow(0 0 4px rgba(255,176,0,0.45));
}

.label {
fill: #ffb000;
font-size: 13px;
text-anchor: middle;
}

.label-small {
fill: rgba(255,176,0,0.92);
font-size: 11px;
text-anchor: middle;
}

.hud {
fill: rgba(255,176,0,0.55);
font-size: 10px;
letter-spacing: 1px;
}

.bottom {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 24px;
align-items: end;
}

.info-box {
border-top: 1px solid rgba(255,176,0,0.24);
padding-top: 10px;
}

.info-title {
font-size: 12px;
letter-spacing: 1px;
color: rgba(255,176,0,0.74);
margin-bottom: 8px;
}

.info-value {
font-size: 30px;
line-height: 1.1;
text-shadow: 0 0 8px rgba(255,176,0,0.2);
}

.agenda-value {
font-size: 22px;
line-height: 1.2;
}
</style>
</head>
<body>

</div>

</div>

<div class="info-title">AGENDA</div>
<div class="info-value agenda-value" id="calendar">CARGANDO...</div>
</div>

</div>

<script>
function updateClock() {
var now = new Date();
var h = now.getHours();
var m = now.getMinutes();
if (h < 10) h = "0" + h;
if (m < 10) m = "0" + m;
document.getElementById("clock").innerHTML = h + ":" + m;
}

function updateWeather() {
fetch("/api/weather?lat=-34.6&lon=-58.4")
.then(function(res) { return res.json(); })
.then(function(data) {
if (data && data.current_weather) {
document.getElementById("weather").innerHTML =
data.current_weather.temperature + "°C";
} else {
document.getElementById("weather").innerHTML = "SIN DATOS";
}
})
.catch(function() {
document.getElementById("weather").innerHTML = "SIN DATOS";
});
}

function updateCalendar() {
fetch("/api/calendar")
.then(function(res) { return res.json(); })
.then(function(data) {
var el = document.getElementById("calendar");

if (!data || !data.events || !data.events.length) {
el.innerHTML = "SIN EVENTOS";
return;
}

var items = data.events.slice(0, 2);

var lines = items.map(function(ev) {
var title = ev.title || "EVENTO";
var day = ev.dayLabel || "";
var dateNum = ev.dateNum || "";
var start = ev.start || "";

if (ev.allDay) {
return day + " " + dateNum + " · " + title;
} else {
return day + " " + dateNum + " · " + start + " · " + title;
}
});

el.innerHTML = lines.join("<br>");
})
.catch(function() {
document.getElementById("calendar").innerHTML = "ERROR AGENDA";
});
}

updateClock();
updateWeather();
updateCalendar();

setInterval(updateClock, 1000);
setInterval(updateWeather, 600000);
setInterval(updateCalendar, 300000);
</script>

</html>
